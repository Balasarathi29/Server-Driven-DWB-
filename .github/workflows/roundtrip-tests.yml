name: Roundtrip E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "server-driven-ui/**"
      - ".github/workflows/roundtrip-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "server-driven-ui/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      backend:
        image: node:18-alpine
        options: >-
          --health-cmd "node -e 'require(\"http\").get(\"http://localhost:5001/health\", (r) => process.exit(r.statusCode === 200 ? 0 : 1))'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            server-driven-ui/package-lock.json
            sdui-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: sdui-backend
        run: npm install --legacy-peer-deps

      - name: Start backend server
        working-directory: sdui-backend
        run: |
          npm run dev > backend.log 2>&1 &
          sleep 5
          curl -f http://localhost:5001/health || (cat backend.log && exit 1)

      - name: Install frontend dependencies
        working-directory: server-driven-ui
        run: npm install

      - name: Build frontend (next build)
        working-directory: server-driven-ui
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001

      - name: Start frontend dev server
        working-directory: server-driven-ui
        run: |
          npm run dev > frontend.log 2>&1 &
          sleep 10
          curl -f http://localhost:3000 || (cat frontend.log && exit 1)

      - name: Install Playwright browsers
        working-directory: server-driven-ui
        run: npx playwright install chromium

      - name: Run Playwright roundtrip tests
        working-directory: server-driven-ui
        run: npx playwright test tests/roundtrip.spec.ts --reporter=html --reporter=github

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: server-driven-ui/playwright-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: |
            server-driven-ui/backend.log
            server-driven-ui/frontend.log
